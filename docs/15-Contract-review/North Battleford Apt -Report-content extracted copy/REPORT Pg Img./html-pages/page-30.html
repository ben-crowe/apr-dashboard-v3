<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Analysis - Zoning Map</title>
    <link rel="stylesheet" href="master-appraisal-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .page {
            width: 816px;
            height: 1056px;
            background-color: white;
            margin: 0 auto;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #000;
            margin-bottom: 20px;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }

        .map-title {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #003d7a;
            margin-bottom: 15px;
        }

        .image-placeholder {
            width: 500px;
            height: 380px;
            background-color: #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
            border: 1px dashed #999;
            font-weight: normal;
            margin: 0 auto;
            flex-grow: 1;
        }

        .footer {
            margin-top: auto;
            font-size: 9px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .footer-left {
            flex: 1;
        }

        .footer-right {
            width: 60px;
            height: 20px;
            background: linear-gradient(90deg, #5b9bd5 0%, #003d7a 100%);
            border-radius: 2px;
        }

        @media print {
            body {
                padding: 0;
                background-color: white;
            }
            .page {
                width: 8.5in;
                height: 11in;
                margin: 0;
                box-shadow: none;
                padding: 0.5in;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="section-title">Property Analysis</div>

        <div class="map-title">Zoning Map</div>

        <div class="image-placeholder">
            [MAP: Zoning/cadastral map of North Battleford showing property parcels with zoning designations (R2, R3, R1, IS, C2) and marked areas of interest]
        </div>

        <div class="footer">
            <div class="footer-left">25   1101, 1121 109 St, North Battleford, Saskatchewan | File VAL251012 - 1</div>
            <div class="footer-right"></div>
        </div>
    </div>
</body>
</html>
