<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APR Dashboard</title>
    <meta name="description" content="APR Dashboard - Appraisal Management System" />
    <meta name="author" content="Valta Appraisals" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- No-flash theme boot: apply the saved theme to <html> BEFORE React paints (default light).
         Must stay in sync with ThemeProvider (src/components/theme-provider.tsx). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'light';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.classList.toggle('light', !dark);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
