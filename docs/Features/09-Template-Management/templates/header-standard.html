<!-- STANDARD PAGE HEADER TEMPLATE -->
<!-- Copy this for any new page section -->

<style>
    /* Page-specific styling (replace "Page XX" with actual page number) */
    .page-sheet[data-page-num="Page XX"] {
        padding: 54px;
        padding-bottom: 180px;
    }

    .page-sheet[data-page-num="Page XX"] h1.Header1 {
        font-size: 18pt;
        color: #003b7e;
        border-bottom: 1px solid #003b7e;  /* REQUIRED - DO NOT REMOVE */
        padding-bottom: 5px;                /* REQUIRED - DO NOT REMOVE */
        margin-bottom: 12px;
        font-weight: normal;
    }

    .page-sheet[data-page-num="Page XX"] h2.Header2 {
        font-size: 11pt;
        color: #003b7e;
        font-weight: bold;
        text-transform: uppercase;
        margin-top: 15px;
        margin-bottom: 12px;
    }

    .page-sheet[data-page-num="Page XX"] p {
        font-size: 10pt;
        line-height: 1.4;
        text-align: justify;
        margin-bottom: 12px;
    }
</style>

<div class="page-sheet" data-page-num="Page XX">
    <!-- Main Page Header (Header1) -->
    <h1 class="Header1">Main Section Title</h1>

    <!-- Section Header (Header2) - Optional -->
    <h2 class="Header2">Subsection Title</h2>

    <!-- Page content goes here -->

    <!-- Page Footer (always at bottom) -->
    <div class="page-footer">
        <div>
            <span class="page-num">XX</span>
            <span
                class="field-mapped"
                data-field-id="{{subject-street}}"
                title="{{subject-street}}"
                data-sample="1101, 1121 109 St, North Battleford, Saskatchewan"
            >{{subject-street}}</span>
            | File
            <span
                class="field-mapped"
                data-field-id="{{job-number}}"
                title="{{job-number}}"
                data-sample="VAL251012 - 1"
            >{{job-number}}</span>
        </div>
        <div class="footer-accent"></div>
    </div>
</div>
