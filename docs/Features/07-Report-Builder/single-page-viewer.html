<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Single Page Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .nav-bar {
      background: #003d7a;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .nav-bar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: normal;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .controls input {
      width: 80px;
      padding: 6px;
      font-size: 14px;
    }

    .controls button {
      background: #4a9fd8;
      color: white;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .controls button:hover {
      background: #5ab0e8;
    }

    .page-container {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .page-frame {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 816px;
      min-height: 1056px;
    }

    #error-message {
      color: #d32f2f;
      background: #ffebee;
      padding: 12px;
      margin: 20px;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <h1>Single Page Viewer</h1>
    <div class="controls">
      <label style="color: white;">Page:</label>
      <input type="number" id="pageInput" value="3" min="1" max="79" />
      <button onclick="loadPage()">Load Page</button>
      <button onclick="prevPage()">← Prev</button>
      <button onclick="nextPage()">Next →</button>
    </div>
  </div>

  <div id="error-message"></div>

  <div class="page-container">
    <iframe id="pageFrame" class="page-frame"></iframe>
  </div>

  <script>
    const basePath = '6-Souce Reports & Workbook/Ref-1-North Battleford/REPORT Pg Img/html-pages/';

    function padPageNumber(num) {
      return String(num).padStart(2, '0');
    }

    function loadPage() {
      const pageNum = parseInt(document.getElementById('pageInput').value);
      const paddedNum = padPageNumber(pageNum);
      const pagePath = basePath + 'page-' + paddedNum + '.html';

      const frame = document.getElementById('pageFrame');
      const errorMsg = document.getElementById('error-message');

      // Hide previous error
      errorMsg.style.display = 'none';

      // Load the page
      frame.src = pagePath;

      // Handle load errors
      frame.onerror = function() {
        errorMsg.textContent = 'Error: Could not load page ' + pageNum + ' (' + pagePath + ')';
        errorMsg.style.display = 'block';
      };
    }

    function prevPage() {
      const input = document.getElementById('pageInput');
      let pageNum = parseInt(input.value);
      if (pageNum > 1) {
        input.value = pageNum - 1;
        loadPage();
      }
    }

    function nextPage() {
      const input = document.getElementById('pageInput');
      let pageNum = parseInt(input.value);
      if (pageNum < 79) {
        input.value = pageNum + 1;
        loadPage();
      }
    }

    // Handle Enter key in input
    document.getElementById('pageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        loadPage();
      }
    });

    // Load initial page on startup
    loadPage();
  </script>
</body>
</html>
