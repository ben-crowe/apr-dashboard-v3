      - listitem [ref=e154]: The author will not be responsible for matters of a legal nature that affect either the property being appraised or the title to it. The property is appraised on the basis of it being under responsible ownership. No registry office search has been performed and the author assumes that the title is good and marketable and free and clear of all encumbrances. Matters of a legal nature, including confirming who holds legal title to the appraised property or any portion of the appraised property, are outside the scope of work and expertise of the appraiser. Any information regarding the identity of a property’s owner or identifying the property owned by the listed client and/or applicant provided by the appraiser is for informational purposes only and any reliance on such information is unreasonable. Any information provided by the appraiser does not constitute any title confirmation. Any information provided does not negate the need to retain a real estate lawyer, surveyor or other appropriate experts to verify matters of ownership and/or title.
