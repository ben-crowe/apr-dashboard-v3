<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>APR Board (RAW — images only)</title>
<style>
  * { box-sizing: border-box }
  html, body {
    margin: 0; padding: 0;
    background: #0b0f17;
    color: #cbd5e1;
    font-family: -apple-system, system-ui, sans-serif;
  }
  main {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    gap: 64px;
    padding: 80px 60px;
    overflow-x: auto;
    min-height: 100vh;
  }
  figure {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  figure img {
    display: block;
    height: 400px;
    width: auto;
    max-width: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border-radius: 4px;
  }
  figure figcaption {
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
    max-width: 360px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<main>
    <figure>
      <img src="assets/00-htmlcap-fieldreg.png" alt="Headless capture: field-registry-v6" loading="lazy">
      <figcaption>Headless capture: field-registry-v6</figcaption>
    </figure>
    <figure>
      <img src="assets/01-htmlcap-fieldreg-clean.png" alt="Headless capture: clean (no annotate)" loading="lazy">
      <figcaption>Headless capture: clean (no annotate)</figcaption>
    </figure>
    <figure>
      <img src="assets/02-htmlcap-fieldreg-zoom.png" alt="Headless capture: zoom region" loading="lazy">
      <figcaption>Headless capture: zoom region</figcaption>
    </figure>
    <figure>
      <img src="assets/03-htmlcap-fieldreg-fullscreen.png" alt="Headless capture: full-screen app size" loading="lazy">
      <figcaption>Headless capture: full-screen app size</figcaption>
    </figure>
    <figure>
      <img src="assets/04-htmlcap-fieldreg-fullpage.png" alt="Headless capture: full page (--full)" loading="lazy">
      <figcaption>Headless capture: full page (--full)</figcaption>
    </figure>
    <figure>
      <img src="assets/05-htmlcap-logic-tab-tophalf.png" alt="Multi-step: click tab → capture section" loading="lazy">
      <figcaption>Multi-step: click tab → capture section</figcaption>
    </figure>
    <figure>
      <img src="assets/06-lf-section.png" alt="Size: Section (1280×577)" loading="lazy">
      <figcaption>Size: Section (1280×577)</figcaption>
    </figure>
    <figure>
      <img src="assets/07-lf-monitor.png" alt="Size: Monitor (1920×1080)" loading="lazy">
      <figcaption>Size: Monitor (1920×1080)</figcaption>
    </figure>
    <figure>
      <img src="assets/08-lf-full.png" alt="Size: Full (entire scrollable doc)" loading="lazy">
      <figcaption>Size: Full (entire scrollable doc)</figcaption>
    </figure>
</main>
</body>
</html>
