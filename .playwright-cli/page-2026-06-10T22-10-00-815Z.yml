    - paragraph [ref=e57]: The Scope of Work includes inspection of the subject property and surrounding area, review of physical, legal, economic, and market factors, collection of municipal and regulatory information, review of client-provided documents, market research including comparable sales and rental data, highest and best use analysis, application of appropriate valuation approaches, and reconciliation to a final value conclusion.
    - paragraph [ref=e58]: The Scope of Work is developed in accordance with CUSPAP and is sufficient to produce credible results for the Authorized Use.
