<!-- STANDARD FINANCIAL TABLE TEMPLATE -->
<!-- Copy this template for any new financial tables (Income, Expenses, etc.) -->

<style>
    /* Financial Table Styling */
    table.financial-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 7pt;
        margin-bottom: 12px;
    }

    table.financial-table th {
        background-color: #003B7E;
        color: white;
        font-weight: bold;
        font-size: 8pt;
        padding: 3px 6px;
        text-align: left;
        border: 1px solid #003B7E;
    }

    table.financial-table td {
        padding: 2px 4px;
        border: none;
        vertical-align: top;
        line-height: 1.3;
    }

    table.financial-table td.label {
        font-weight: 600;
        width: 30%;
    }

    table.financial-table tr.section-header {
        background: #f0f0f0;
        border-bottom: 0.5px solid #333;
        border-top: 6px solid white;
    }

    table.financial-table tr.total {
        font-weight: bold;
        border-top: 2px solid #003B7E;
    }
</style>

<table class="financial-table">
    <thead>
        <tr>
            <th>Item</th>
            <th style="text-align: center;">Units</th>
            <th style="text-align: right;">$/Unit</th>
            <th style="text-align: right;">$/SF</th>
            <th style="text-align: right;">Annual</th>
        </tr>
    </thead>
    <tbody>
        <!-- Section Header Row -->
        <tr class="section-header">
            <td colspan="5" style="font-weight: bold; font-size: 8pt;">
                SECTION NAME
            </td>
        </tr>

        <!-- Data Row Example -->
        <tr>
            <td class="label">Line Item Name</td>
            <td style="text-align: center;">
                <span
                    class="field-mapped"
                    data-field-id="{{field-id}}"
                    title="{{field-id}}"
                    data-sample="24"
                >{{field-id}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{field-per-unit}}"
                    title="{{field-per-unit}}"
                    data-sample="$1,020"
                >{{field-per-unit}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{field-per-sf}}"
                    title="{{field-per-sf}}"
                    data-sample="$19.19"
                >{{field-per-sf}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{field-annual}}"
                    title="{{field-annual}}"
                    data-sample="$195,840"
                >{{field-annual}}</span>
            </td>
        </tr>

        <!-- Total Row Example -->
        <tr class="total">
            <td class="label">TOTAL</td>
            <td style="text-align: center;">
                <span
                    class="field-mapped"
                    data-field-id="{{total-units}}"
                    title="{{total-units}}"
                    data-sample="24"
                >{{total-units}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{total-per-unit}}"
                    title="{{total-per-unit}}"
                    data-sample="$1,020"
                >{{total-per-unit}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{total-per-sf}}"
                    title="{{total-per-sf}}"
                    data-sample="$19.19"
                >{{total-per-sf}}</span>
            </td>
            <td style="text-align: right;">
                <span
                    class="field-mapped"
                    data-field-id="{{total-annual}}"
                    title="{{total-annual}}"
                    data-sample="$195,840"
                >{{total-annual}}</span>
            </td>
        </tr>
    </tbody>
</table>
