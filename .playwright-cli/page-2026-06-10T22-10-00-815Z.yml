      - listitem [ref=e156]: No survey of the property has been made. Any sketch in this report shows approximate dimensions and is included only to assist the reader of this report in visualizing the property. It is unreasonable to rely on this report as an alternative to a survey, and an accredited surveyor ought to be retained for such matters.
      - listitem [ref=e157]: "This report is completed on the basis that testimony or appearance in court concerning this report is not required unless specific arrangements to do so have been made beforehand. Such arrangements will include, but not necessarily be limited to: adequate time to review the report and related data, and the provision of appropriate compensation."
      - listitem [ref=e158]: "Unless otherwise stated in this report, the author has no knowledge of any hidden or unapparent conditions (including, but not limited to: its soils, physical structure, mechanical or other operating systems, foundation, etc.) of/on the subject property or of/on a neighbouring property that could affect the value of the subject property. It has been assumed that there are no such conditions. Any such conditions that were visibly apparent at the time of inspection or that became apparent during the normal research involved in completing the report have been noted in the report. This report should not be construed as an environmental audit or detailed property condition report, as such reporting is beyond the scope of this report and/or the qualifications of the author. The author makes no guarantees or warranties, express or implied, regarding the condition of the property, and will not be responsible for any such conditions that do exist or for any engineering or testing that might be required to discover whether such conditions exist. The bearing capacity of the soil is assumed to be adequate."
      - listitem [ref=e159]: The author is not qualified to comment on detrimental environmental, chemical or biological conditions that may affect the market value of the property appraised, including but not limited to pollution or contamination of land, buildings, water, groundwater or air which may include but are not limited to moulds and mildews or the conditions that may give rise to either. Any such conditions that were visibly apparent at the time of inspection or that became apparent during the normal research involved in completing the report have been noted in the report. It is an assumption of this report that the property complies with all regulatory requirements concerning environmental, chemical and biological matters, and it is assumed that the property is free of any detrimental environmental, chemical legal and biological conditions that may affect the market value of the property appraised. If a party relying on this report requires information about or an assessment of detrimental environmental, chemical or biological conditions that may impact the value conclusion herein, that party is advised to retain an expert qualified in such matters. The author expressly denies any legal liability related to the effect of detrimental environmental, chemical or biological matters on the market value of the property.
