<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuation & Conclusions - Page 46</title>
    <link rel="stylesheet" href="master-appraisal-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        @page {
            size: 8.5in 11in;
            margin: 0.5in;
        }

        .page {
            width: 816px;
            height: 1056px;
            background: white;
            margin: 0 auto 20px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            page-break-after: always;
        }

        .page-header {
            margin-bottom: 40px;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 12px;
        }

        .page-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            letter-spacing: 0px;
        }

        .page-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .decorative-banner {
            width: 160px;
            height: 40px;
            background: linear-gradient(90deg, #4a9fd8 0%, #1e3a5f 100%);
            align-self: flex-end;
            margin-top: auto;
            margin-right: 0;
        }

        .page-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            font-size: 10px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }

        .page-footer-left {
            flex: 1;
        }

        .page-footer-right {
            font-weight: 600;
            color: #333;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .page {
                margin: 0;
                box-shadow: none;
                width: 100%;
                height: 100%;
                padding: 40px;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>Valuation & Conclusions</h1>
        </div>

        <div class="page-content">
            <!-- Main content area (mostly blank for section divider) -->

            <div class="decorative-banner"></div>
        </div>

        <div class="page-footer">
            <div class="page-footer-left">
                41&nbsp;&nbsp;&nbsp;&nbsp;1101, 1121 109 St, North Battleford, Saskatchewan | File VAL251012 - 1
            </div>
        </div>
    </div>
</body>
</html>
