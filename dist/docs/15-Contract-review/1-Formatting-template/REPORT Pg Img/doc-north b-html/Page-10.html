    .map-text {
      position: absolute;
      color: #666;
      font-size: 12px;
      font-weight: normal;
    }

    .footer-info {

      font-size: 11px;
      color: #333;
      border-top: 1px solid #ddd;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;

    .footer-right {
      width: 150px;

      background: linear-gradient(to right, #0066cc 0%, #003366 100%);
