<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Template</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #fff; }
    .page-sheet {
      width: 612px;
      height: 792px;
      border: 1px solid #ccc;
      margin: 20px auto;
      padding: 40px;
      box-sizing: border-box;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .cover-photo-container {
      width: 300px;
      height: 200px;
      border: 1px solid #999;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 20px 0;
    }
    .cover-photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .placeholder-text {
      color: #999;
      font-size: 12px;
    }
    .field-mapped { background: rgba(255,255,0,0.2); }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #pages-wrapper { }
  </style>
</head>
<body>
  <div id="pages-wrapper">
    <!-- Page 1: Cover -->
    <div class="page-sheet" data-page-num="1">
      <h1>Appraisal Report</h1>

      <p>Property: <span class="field-mapped" title="{{property-name}}">{{property-name}}</span></p>
      <p>Address: <span class="field-mapped" title="{{property-address}}">{{property-address}}</span></p>

      <!-- THE CRITICAL IMAGE -->
      <div class="cover-photo-container field-mapped" title="{{subject-photo}}">
        <img src="{{subject-photo}}" alt="Subject Photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="placeholder-text" style="display:none;">Property Photo</div>
      </div>

      <p>Prepared by: <span class="field-mapped" title="{{appraiser-name}}">{{appraiser-name}}</span></p>
    </div>

    <!-- Page 2: Photos -->
    <div class="page-sheet" data-page-num="2">
      <h1>Subject Photos</h1>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <div class="cover-photo-container field-mapped" title="{{subject-photo-1}}">
            <img src="{{subject-photo-1}}" alt="Photo 1" onerror="this.style.display='none';" />
          </div>
          <p class="field-mapped" title="{{subject-photo-1-caption}}">{{subject-photo-1-caption}}</p>
        </div>
        <div>
          <div class="cover-photo-container field-mapped" title="{{subject-photo-2}}">
            <img src="{{subject-photo-2}}" alt="Photo 2" onerror="this.style.display='none';" />
          </div>
          <p class="field-mapped" title="{{subject-photo-2-caption}}">{{subject-photo-2-caption}}</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // This function is called by parent to update page count
    function updatePageCount() {
      const pages = document.querySelectorAll('.page-sheet');
      console.log('[Template] updatePageCount:', pages.length, 'pages');
    }
  </script>
</body>
</html>
