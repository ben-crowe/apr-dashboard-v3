<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appraisal Report - Page 8</title>
    <link rel="stylesheet" href="master-appraisal-styles.css">
  <style>
    @page {
      size: 8.5in 11in;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 8.5in;
      height: 11in;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #000;
      display: flex;
      flex-direction: column;
    }

    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 35px;
      position: relative;
    }

    .header {
      font-size: 14px;
      font-weight: bold;
      text-decoration: underline;
      border-bottom: 2px solid #4a90e2;
      padding-bottom: 8px;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .header-text {
      display: inline-block;
    }

    .photo-container {
      width: 160px;
      margin-top: 10px;
    }

    .photo-placeholder {
      width: 160px;
      height: 200px;
      background: #d4d4d4;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 11px;
      text-align: center;
      margin-bottom: 8px;
    }

    .photo-caption {
      font-size: 11px;
      text-align: center;
      font-weight: normal;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 35px;
      right: 35px;
      font-size: 9px;
      line-height: 1.4;
      color: #000;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-left {
      flex: 1;
    }

    .footer-accent {
      width: 120px;
      height: 24px;
      background: linear-gradient(to right, #4a90e2 0%, #2e5c8a 100%);
      position: absolute;
      bottom: 20px;
      right: 35px;
    }
  </style>
</head>
<body>
  <div class="page-content">
    <div class="header">
      <span class="header-text">Introduction & Executive Summary</span>
    </div>

    <div class="photo-container">
      <div class="photo-placeholder">
        [PHOTO: Utility Room]
      </div>
      <div class="photo-caption">1121 - Utility Room</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">
      <span>8     1101, 1121 109 St. North Battleford, Saskatchewan | File VAL251012 - 1</span>
    </div>
  </div>

  <div class="footer-accent"></div>
</body>
</html>
