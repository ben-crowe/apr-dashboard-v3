<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APR Dashboard — Demo Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .player-container {
      max-width: 960px;
      width: 100%;
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 13px;
      color: #888;
    }
    video {
      width: 100%;
      display: block;
      background: #000;
    }
    .meta {
      padding: 16px 24px;
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #222;
    }
    .meta span { white-space: nowrap; }
    .meta .label { color: #888; margin-right: 4px; }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="header">
      <h1>APR Dashboard — Client Intake Form Demo</h1>
      <p>Automated walkthrough of field population and dropdown selection</p>
    </div>
    <video controls autoplay>
      <source src="client-form-test-v4.mp4" type="video/mp4">
      <source src="client-form-test-v4.webm" type="video/webm">
      Your browser does not support the video tag.
    </video>
    <div class="meta">
      <span><span class="label">Format:</span> MP4 (H.264)</span>
      <span><span class="label">Resolution:</span> 2400x1524</span>
      <span><span class="label">Duration:</span> 1:27</span>
      <span><span class="label">Date:</span> 2026-03-31</span>
    </div>
  </div>
</body>
</html>
