<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appraisal Report - Page 22</title>
    <link rel="stylesheet" href="master-appraisal-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            line-height: 1.4;
            color: #000;
            background: #f5f5f5;
            padding: 20px;
        }

        .page {
            width: 816px;
            height: 1056px;
            background: white;
            margin: 0 auto;
            padding: 40px 36px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .header-left {
            font-size: 14px;
            color: #333;
        }

        .header-right {
            width: 50px;
            height: 24px;
            background: linear-gradient(to right, #4a90e2 0%, #1a3a5c 100%);
            border-radius: 2px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 6px;
            margin-bottom: 20px;
        }

        .subsection-title {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            color: #000;
        }

        .image-placeholder {
            width: 600px;
            height: 450px;
            background: #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
            border: 1px dashed #999;
            font-weight: normal;
            margin: 0 auto 20px;
            font-family: Arial, sans-serif;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 36px;
            right: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #666;
            border-top: 1px solid #ddd;
            padding-top: 8px;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-right {
            width: 60px;
            height: 20px;
            background: linear-gradient(to right, #4a90e2 0%, #1a3a5c 100%);
            border-radius: 2px;
        }

        /* Print styles */
        @media print {
            body {
                padding: 0;
                background: white;
            }
            .page {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 40px 36px;
                box-shadow: none;
                page-break-after: always;
            }
        }

        @page {
            size: 8.5in 11in;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>

        <div class="section-title">Property Analysis</div>

        <div class="subsection-title">Site Plans – Lot 18</div>

        <div class="image-placeholder">
            [MAP: Property site plan showing Lot 18 with cadastral references, property boundaries, and subject property outlined in red with dimensions 36.57m × 19.51m]
        </div>

        <div class="footer">
            <div class="footer-left">
                <span>22</span>
                <span>1101, 1121 109 St, North Battleford, Saskatchewan | File VAL251012 - 1</span>
            </div>
            <div class="footer-right"></div>
        </div>
    </div>
</body>
</html>
