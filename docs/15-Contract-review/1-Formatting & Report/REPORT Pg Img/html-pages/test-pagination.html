<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pagination Test - Sample Pages</title>
    <link rel="stylesheet" href="master-appraisal-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: 8.5in 11in;
            margin: 0;
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            line-height: 1.5;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        .page {
            width: 816px;
            height: 1056px;
            background: white;
            padding: 40px 50px 60px 50px;
            margin: 0 auto 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            page-break-after: always;
            overflow: hidden;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .page {
                width: 100%;
                height: 100%;
                margin: 0;
                box-shadow: none;
                padding: 0.5in;
                page-break-after: always;
            }
            .test-controls {
                display: none;
            }
        }

        .test-controls {
            background: #0a3d62;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            max-width: 816px;
            margin-left: auto;
            margin-right: auto;
        }

        .test-controls h1 {
            color: white !important;
            border-bottom: none !important;
            margin-bottom: 10px;
        }

        .test-controls p {
            margin: 5px 0;
            font-size: 12px;
        }

        .test-controls button {
            background: white;
            color: #0a3d62;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }

        .test-controls button:hover {
            background: #f0f0f0;
        }

        iframe {
            width: 816px;
            height: 1056px;
            border: none;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            background: white;
        }
    </style>
</head>
<body>
    <div class="test-controls">
        <h1>PDF Pagination Test</h1>
        <p>Testing 3 sample pages: Page 18 (text), Page 23 (tables), Page 18 (mixed content)</p>
        <p>Each page is self-contained, no overflow, correct page breaks</p>
        <button onclick="window.print()">Print Test (Cmd+P)</button>
        <button onclick="location.reload()">Reload</button>
    </div>

    <iframe src="page-18.html"></iframe>
    <iframe src="page-23.html"></iframe>
    <iframe src="page-18.html"></iframe>
</body>
</html>
